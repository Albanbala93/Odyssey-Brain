name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm --filter web exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm --filter web test:e2e

      - name: Dependency audit
        # Informational, not blocking: pnpm's minimumReleaseAge policy
        # (pnpm-workspace.yaml) already guards against fresh supply-chain
        # attacks, and a hard-fail here would block merges on advisories in
        # transitive deps this team can't immediately fix. Surfacing it in
        # CI logs is still strictly better than not checking at all.
        run: pnpm audit --audit-level=high
        continue-on-error: true
